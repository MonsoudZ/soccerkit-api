openapi: 3.0.3
info:
  title: SoccerCoachKit API
  description: >-
    Backend for SoccerCoachKit — a coach → club evaluation platform. Models the
    whole castle (organizations, roles, persons, guardianships, time-bounded
    roster memberships, a generic evaluation engine, polymorphic sharing) while
    Phase 1 ships the solo-coach surface: identity, teams + roster, and the
    pre/post-game evaluation loop with cross-instance score aggregation.
  version: 0.2.0
servers:
  - url: /
    description: Current host
tags:
  - name: auth
  - name: me
  - name: persons
  - name: teams
  - name: evaluation

paths:
  /health:
    get:
      tags: [system]
      summary: Liveness probe
      responses: { "200": { description: OK } }

  /api/v1/auth/register:
    post:
      tags: [auth]
      summary: Create a coach account (provisions Person + UserAccount + personal Organization + admin/director/coach memberships + seeded templates)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RegisterRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthResponse" }
        "409": { $ref: "#/components/responses/Error" }
  /api/v1/auth/login:
    post:
      tags: [auth]
      summary: Exchange credentials for tokens
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginRequest" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthResponse" }
        "401": { $ref: "#/components/responses/Error" }
  /api/v1/auth/refresh:
    post:
      tags: [auth]
      summary: Rotate a refresh token for a new token pair
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RefreshRequest" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthResponse" }
        "401": { $ref: "#/components/responses/Error" }
  /api/v1/auth/logout:
    post:
      tags: [auth]
      summary: Revoke a refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RefreshRequest" }
      responses:
        "200": { $ref: "#/components/responses/Ok" }

  /api/v1/me:
    get:
      tags: [me]
      summary: The authenticated person and their org memberships
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Me" }
        "401": { $ref: "#/components/responses/Error" }

  /api/v1/persons:
    post:
      tags: [persons]
      summary: Add a person (athlete) to your organization
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/OrgHeader" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreatePersonRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Person" }
        "403": { $ref: "#/components/responses/Error" }
  /api/v1/persons/{id}:
    get:
      tags: [persons]
      summary: Get a person
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/Id" }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Person" }
        "404": { $ref: "#/components/responses/Error" }
  /api/v1/persons/{id}/instances:
    get:
      tags: [persons, evaluation]
      summary: List a person's evaluation instances (most recent first)
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/Id" }
        - { in: query, name: context, schema: { $ref: "#/components/schemas/FormContext" } }
        - { in: query, name: limit, schema: { type: integer, default: 50 } }
        - { in: query, name: offset, schema: { type: integer, default: 0 } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/InstanceSummary" } }
  /api/v1/persons/{id}/aggregate:
    get:
      tags: [persons, evaluation]
      summary: Cross-instance score averages for an athlete (readiness mean / effort trend)
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/Id" }
        - { in: query, name: context, schema: { $ref: "#/components/schemas/FormContext" } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/ScoreAggregate" } }

  /api/v1/teams:
    get:
      tags: [teams]
      summary: List teams in your organization
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/OrgHeader" }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/Team" } }
    post:
      tags: [teams]
      summary: Create a team
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/OrgHeader" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateTeamRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Team" }
  /api/v1/teams/{id}:
    get:
      tags: [teams]
      summary: Get a team with its active roster
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/Id" }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  team: { $ref: "#/components/schemas/Team" }
                  roster: { type: array, items: { $ref: "#/components/schemas/RosterEntry" } }
        "403": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
    delete:
      tags: [teams]
      summary: Delete a team
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/Id" }]
      responses:
        "200": { $ref: "#/components/responses/Ok" }
        "403": { $ref: "#/components/responses/Error" }
  /api/v1/teams/{id}/roster:
    post:
      tags: [teams]
      summary: Add a person to the team roster (opens a time-bounded membership)
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/Id" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AddRosterRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RosterEntry" }
        "409": { $ref: "#/components/responses/Error" }
  /api/v1/teams/{id}/roster/{personId}:
    delete:
      tags: [teams]
      summary: End a player's active roster membership (leave / move)
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/Id" }
        - { in: path, name: personId, required: true, schema: { type: string, format: uuid } }
      responses:
        "200": { $ref: "#/components/responses/Ok" }
        "404": { $ref: "#/components/responses/Error" }

  /api/v1/templates:
    get:
      tags: [evaluation]
      summary: List evaluation templates available to you
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/OrgHeader" }
        - { in: query, name: context, schema: { $ref: "#/components/schemas/FormContext" } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/FormTemplate" } }
    post:
      tags: [evaluation]
      summary: Create a custom evaluation template
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/OrgHeader" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateTemplateRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FormTemplate" }
        "403": { $ref: "#/components/responses/Error" }
  /api/v1/templates/{id}:
    get:
      tags: [evaluation]
      summary: Get a template with its fields
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/Id" }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FormTemplate" }
        "404": { $ref: "#/components/responses/Error" }

  /api/v1/form-instances:
    post:
      tags: [evaluation]
      summary: Submit a filled-out evaluation (instance + normalized answers)
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/OrgHeader" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SubmitInstanceRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FormInstance" }
        "400": { $ref: "#/components/responses/Error" }
  /api/v1/form-instances/{id}:
    get:
      tags: [evaluation]
      summary: Get an evaluation instance with its answers
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/Id" }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FormInstance" }
        "404": { $ref: "#/components/responses/Error" }

  /api/v1/drills:
    get:
      tags: [content]
      summary: List drills in your organization
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/OrgHeader" }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/Drill" } }
    post:
      tags: [content]
      summary: Create a drill
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/OrgHeader" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                description: { type: string }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Drill" }

  /api/v1/sessions:
    get:
      tags: [content]
      summary: List training sessions
      security: [{ bearerAuth: [] }]
      parameters:
        - { $ref: "#/components/parameters/OrgHeader" }
        - { in: query, name: teamId, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/Session" } }
    post:
      tags: [content]
      summary: Create a training session with blocks
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/OrgHeader" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateSessionRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Session" }
  /api/v1/sessions/{id}:
    get:
      tags: [content]
      summary: Get a session with its blocks
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/Id" }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Session" }
        "404": { $ref: "#/components/responses/Error" }
    delete:
      tags: [content]
      summary: Delete a session
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/Id" }]
      responses:
        "200": { $ref: "#/components/responses/Ok" }

  /api/v1/teams/{id}/games:
    get:
      tags: [games]
      summary: List a team's games
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/Id" }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/Game" } }
    post:
      tags: [games]
      summary: Schedule a game
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/Id" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateGameRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Game" }
  /api/v1/games/{id}:
    get:
      tags: [games]
      summary: Get a game
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/Id" }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Game" }
        "404": { $ref: "#/components/responses/Error" }
    patch:
      tags: [games]
      summary: Update a game (record kickoff, status, and result)
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: "#/components/parameters/Id" }]
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateGameRequest" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Game" }
        "400": { $ref: "#/components/responses/Error" }

components:
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer, bearerFormat: JWT }
  parameters:
    Id:
      in: path
      name: id
      required: true
      schema: { type: string, format: uuid }
    OrgHeader:
      in: header
      name: X-Organization-ID
      required: false
      description: Act within a specific organization; defaults to your single/first org.
      schema: { type: string, format: uuid }
  responses:
    Error:
      description: Error
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Ok:
      description: OK
      content:
        application/json:
          schema:
            type: object
            properties: { ok: { type: boolean } }
  schemas:
    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code: { type: string }
            message: { type: string }
    Role:
      type: string
      enum: [admin, director, coach, parent, player]
    FormContext:
      type: string
      enum: [tryout, pre_game, post_game, development, movement, coach_review]
    FieldKind:
      type: string
      enum: [scale, bool, number, text, select]
    Person:
      type: object
      properties:
        id: { type: string, format: uuid }
        displayName: { type: string }
        givenName: { type: string, nullable: true }
        familyName: { type: string, nullable: true }
        birthdate: { type: string, nullable: true, description: "YYYY-MM-DD" }
        email: { type: string, nullable: true }
        phone: { type: string, nullable: true }
        emergencyContactName: { type: string, nullable: true }
        emergencyContactPhone: { type: string, nullable: true }
        medicalNotes: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
    Membership:
      type: object
      properties:
        organizationId: { type: string, format: uuid }
        organizationName: { type: string }
        organizationKind: { type: string, enum: [personal, club] }
        role: { $ref: "#/components/schemas/Role" }
    Me:
      type: object
      properties:
        person: { $ref: "#/components/schemas/Person" }
        memberships: { type: array, items: { $ref: "#/components/schemas/Membership" } }
    AuthResponse:
      type: object
      properties:
        accessToken: { type: string }
        refreshToken: { type: string }
        me: { $ref: "#/components/schemas/Me" }
    RegisterRequest:
      type: object
      required: [email, password, displayName]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 8 }
        displayName: { type: string }
        organizationName: { type: string, description: Optional; defaults to a personal org }
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string }
    RefreshRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken: { type: string }
    CreatePersonRequest:
      type: object
      required: [displayName]
      properties:
        displayName: { type: string }
        givenName: { type: string }
        familyName: { type: string }
        birthdate: { type: string, description: "YYYY-MM-DD" }
        email: { type: string }
        phone: { type: string }
        emergencyContactName: { type: string }
        emergencyContactPhone: { type: string }
        medicalNotes: { type: string }
        asPlayer: { type: boolean, default: true, description: Enroll as a player in the org }
    Team:
      type: object
      properties:
        id: { type: string, format: uuid }
        organizationId: { type: string, format: uuid }
        name: { type: string }
        ageGroup: { type: string, nullable: true }
        season: { type: string, nullable: true }
        activeRosterCount: { type: integer }
        createdAt: { type: string, format: date-time }
    CreateTeamRequest:
      type: object
      required: [name]
      properties:
        name: { type: string }
        ageGroup: { type: string }
        season: { type: string }
    RosterEntry:
      type: object
      properties:
        id: { type: string, format: uuid }
        personId: { type: string, format: uuid }
        displayName: { type: string }
        email: { type: string, nullable: true }
        birthdate: { type: string, nullable: true }
        jerseyNumber: { type: integer, nullable: true }
        position: { type: string, nullable: true }
        joinedOn: { type: string, nullable: true }
        status: { type: string, enum: [active, inactive] }
    AddRosterRequest:
      type: object
      required: [personId]
      properties:
        personId: { type: string, format: uuid }
        jerseyNumber: { type: integer }
        position: { type: string }
        joinedOn: { type: string, description: "YYYY-MM-DD; defaults to today" }
    FormField:
      type: object
      properties:
        id: { type: string, format: uuid }
        key: { type: string }
        label: { type: string }
        kind: { $ref: "#/components/schemas/FieldKind" }
        position: { type: integer }
        config: { nullable: true }
    FormTemplate:
      type: object
      properties:
        id: { type: string, format: uuid }
        organizationId: { type: string, format: uuid, nullable: true }
        context: { $ref: "#/components/schemas/FormContext" }
        name: { type: string }
        subjectType: { type: string, enum: [athlete, coach, team] }
        version: { type: integer }
        isSeed: { type: boolean }
        fields: { type: array, items: { $ref: "#/components/schemas/FormField" } }
    CreateTemplateRequest:
      type: object
      required: [context, name, fields]
      properties:
        context: { $ref: "#/components/schemas/FormContext" }
        name: { type: string }
        subjectType: { type: string, enum: [athlete, coach, team], default: athlete }
        fields:
          type: array
          items:
            type: object
            required: [key, kind]
            properties:
              key: { type: string }
              label: { type: string }
              kind: { $ref: "#/components/schemas/FieldKind" }
              config: {}
    Answer:
      type: object
      properties:
        key: { type: string }
        label: { type: string }
        kind: { $ref: "#/components/schemas/FieldKind" }
        numericValue: { type: number, nullable: true }
        boolValue: { type: boolean, nullable: true }
        textValue: { type: string, nullable: true }
    FormInstance:
      type: object
      properties:
        id: { type: string, format: uuid }
        templateId: { type: string, format: uuid }
        context: { $ref: "#/components/schemas/FormContext" }
        subjectPersonId: { type: string, format: uuid, nullable: true }
        subjectTeamId: { type: string, format: uuid, nullable: true }
        contextRefType: { type: string, nullable: true }
        contextRefId: { type: string, format: uuid, nullable: true }
        submittedAt: { type: string, format: date-time }
        answers: { type: array, items: { $ref: "#/components/schemas/Answer" } }
    SubmitInstanceRequest:
      type: object
      required: [templateId]
      properties:
        templateId: { type: string, format: uuid }
        subjectPersonId: { type: string, format: uuid }
        subjectTeamId: { type: string, format: uuid }
        contextRefType: { type: string }
        contextRefId: { type: string, format: uuid }
        answers:
          type: array
          items:
            type: object
            required: [key]
            properties:
              key: { type: string }
              numericValue: { type: number }
              boolValue: { type: boolean }
              textValue: { type: string }
    InstanceSummary:
      type: object
      properties:
        id: { type: string, format: uuid }
        templateId: { type: string, format: uuid }
        context: { $ref: "#/components/schemas/FormContext" }
        templateName: { type: string }
        contextRefType: { type: string, nullable: true }
        contextRefId: { type: string, format: uuid, nullable: true }
        submittedAt: { type: string, format: date-time }
    ScoreAggregate:
      type: object
      properties:
        key: { type: string }
        label: { type: string }
        samples: { type: integer }
        average: { type: number }
        minimum: { type: number }
        maximum: { type: number }
    Drill:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        description: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
    SessionBlock:
      type: object
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        drillId: { type: string, format: uuid, nullable: true }
        drillName: { type: string, nullable: true }
        durationMin: { type: integer, nullable: true }
        position: { type: integer }
        notes: { type: string, nullable: true }
    Session:
      type: object
      properties:
        id: { type: string, format: uuid }
        teamId: { type: string, format: uuid, nullable: true }
        title: { type: string }
        scheduledAt: { type: string, format: date-time, nullable: true }
        notes: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        blocks: { type: array, items: { $ref: "#/components/schemas/SessionBlock" } }
    CreateSessionRequest:
      type: object
      required: [title]
      properties:
        title: { type: string }
        teamId: { type: string, format: uuid }
        scheduledAt: { type: string, format: date-time }
        notes: { type: string }
        blocks:
          type: array
          items:
            type: object
            required: [title]
            properties:
              title: { type: string }
              drillId: { type: string, format: uuid }
              durationMin: { type: integer }
              notes: { type: string }
    Game:
      type: object
      properties:
        id: { type: string, format: uuid }
        teamId: { type: string, format: uuid }
        opponent: { type: string, nullable: true }
        kickoffAt: { type: string, format: date-time, nullable: true }
        homeAway: { type: string, enum: [home, away, neutral], nullable: true }
        ourScore: { type: integer, nullable: true }
        opponentScore: { type: integer, nullable: true }
        status: { type: string, enum: [scheduled, in_progress, completed, cancelled] }
        createdAt: { type: string, format: date-time }
    CreateGameRequest:
      type: object
      properties:
        opponent: { type: string }
        kickoffAt: { type: string, format: date-time }
